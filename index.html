<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Content Writing Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        
        /* Updated Output Styles for Markdown/Table rendering */
        #output { 
            min-height: 450px; 
            background: #ffffff; 
            border: 1px solid #dee2e6; 
            border-radius: 8px; 
            padding: 20px; 
            font-size: 15px; 
            line-height: 1.6; 
            overflow-x: auto; 
            color: #333;
        }

        /* INLINE TABLE STYLING */
        #output table { 
            width: 100%; 
            margin-bottom: 1.5rem; 
            border-collapse: collapse; 
            font-size: 14px;
        }
        #output th { 
            background-color: #f8f9fa; 
            border: 1px solid #dee2e6; 
            padding: 10px; 
            text-align: left; 
            font-weight: 600;
        }
        #output td { 
            border: 1px solid #dee2e6; 
            padding: 10px; 
            vertical-align: top;
        }
        #output tr:nth-child(even) { background-color: #fafafa; }

        /* Typography improvements for AI output */
        #output h1, #output h2, #output h3 { color: #0d6efd; margin-top: 20px; font-weight: 700; }
        #output ul { padding-left: 20px; }
        
        .progress { height: 8px; display: none; border-radius: 10px; }
        .loading-spinner { display: none; margin-left: 10px; }
        .step-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">UX Content Writing Agent — Finance & Ops Suite</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <div class="mb-4">
                    <label class="step-label mb-2">Phase 1: Upload Screen</label>
                    <p class="small text-muted">Upload a screenshot for initial analysis.</p>
                    <input class="form-control" type="file" id="imageInput" accept="image/*">
                </div>
                
                <div class="mb-4">
                    <label class="step-label mb-2">Phase 2: Context / Follow-up</label>
                    <p class="small text-muted">Provide context or request specific rewrites.</p>
                    <textarea id="userInput" class="form-control" style="height: 200px;" placeholder="e.g., 'The primary user is an auditor...'"></textarea>
                </div>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">
                    Run Agent Logic
                    <span id="spinner" class="spinner-border spinner-border-sm loading-spinner
