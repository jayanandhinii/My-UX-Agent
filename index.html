<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Content Writing Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        /* Changed to allow for formatted text/tables from the Agent */
        #output { min-height: 450px; background: #ffffff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 14px; line-height: 1.5; overflow-x: auto; }
        .progress { height: 8px; display: none; border-radius: 10px; }
        .loading-spinner { display: none; margin-left: 10px; }
        .step-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">UX Content Writing Agent — Finance & Ops Suite</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <div class="mb-4">
                    <label class="step-label mb-2">Phase 1: Upload Screen</label>
                    <p class="small text-muted">Upload a screenshot for initial analysis.</p>
                    <input class="form-control" type="file" id="imageInput" accept="image/*">
                </div>
                
                <div class="mb-4">
                    <label class="step-label mb-2">Phase 2: Context / Follow-up</label>
                    <p class="small text-muted">Provide context or request specific rewrites.</p>
                    <textarea id="userInput" class="form-control" style="height: 200px;" placeholder="e.g., 'The primary user is an auditor...' or 'Provide 3 variants for the Submit button'"></textarea>
                </div>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">
                    Run Agent Logic
                    <span id="spinner" class="spinner-border spinner-border-sm loading-spinner"></span>
                </button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Agent Output</h5>
                <div id="progressText" class="text-muted mb-2 small"></div>
                <div class="progress mb-3" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
                </div>

                <div id="output">Analysis or rewritten content will appear here...</div>
                
                <div class="mt-3 d-flex gap-2">
                    <button onclick="copyToClipboard()" class="btn btn-sm btn-outline-secondary">Copy Content</button>
                    <button onclick="clearInputs()" class="btn btn-sm btn-outline-danger">Clear All</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function runAgent() {
        const notes = document.getElementById('userInput').value;
        const imageInput = document.getElementById('imageInput');
        const imageFile = imageInput.files[0];
        
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');
        const spinner = document.getElementById('spinner');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');

        if (!notes.trim() && !imageFile) return alert("Please upload an image for Phase 1 or provide notes for Phase 2!");

        const formData = new FormData();
        formData.append('notes', notes);
        if (imageFile) formData.append('image', imageFile);

        // UI Feedback
        btn.disabled = true;
        spinner.style.display = "inline-block";
        progressContainer.style.display = 'flex';
        outputDiv.style.opacity = "0.5";
        
        let width = 0;
        const interval = setInterval(() => {
            if (width < 95) {
                width += 1;
                progressBar.style.width = width + '%';
                progressText.innerText = imageFile ? "Phase 1: Analyzing Screen Elements..." : "Phase 2: Generating Content Variants...";
            }
        }, 150);

        try {
            // Updated Lambda URL
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";

            const response = await fetch(LAMBDA_URL, {
                method: 'POST',
                body: formData 
            });

            const data = await response.json();
            console.log("Response Received:", data);

            clearInterval(interval);
            progressBar.style.width = '100%';
            progressText.innerText = "Task Complete";

            // Mapping Logic: The Agent returns a single 'text' block containing Markdown
            // We use .innerText to preserve the AI's formatting and tables
            outputDiv.innerText = data.text || "No response from agent.";
            outputDiv.style.opacity = "1";

            // Auto-clear image after Phase 1 so next click defaults to Phase 2 (notes)
            if (imageFile) {
                imageInput.value = ""; 
            }

        } catch (err) {
            console.error("Fetch Error:", err);
            outputDiv.innerText = "Error: " + err.message;
            clearInterval(interval);
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
            setTimeout(() => { 
                progressContainer.style.display = 'none'; 
                progressBar.style.width = '0%';
            }, 3000);
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Content copied to clipboard!");
    }

    function clearInputs() {
        document.getElementById('userInput').value = "";
        document.getElementById('imageInput').value = "";
        document.getElementById('output').innerText = "Analysis or rewritten content will appear here...";
    }
</script>
</body>
</html>
