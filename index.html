<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Content Agent — Jaya Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        #output { 
            min-height: 500px; background: white; border: 1px solid #dee2e6; border-radius: 8px; 
            padding: 20px; font-size: 15px; line-height: 1.6; overflow-x: auto; 
        }
        /* Markdown Table Styling */
        #output table { width: 100%; margin-bottom: 1rem; border-collapse: collapse; }
        #output th { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        #output td { border: 1px solid #dee2e6; padding: 10px; vertical-align: top; }
        
        .step-label { font-weight: 700; color: #0d6efd; margin-bottom: 8px; display: block; }
        .progress { height: 8px; display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">UX Audit & Content Refinement</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4">
                
                <div class="mb-4">
                    <label class="step-label">Phase 1: Source (Image)</label>
                    <input class="form-control" type="file" id="imageInput" accept="image/*">
                </div>

                <div class="mb-4">
                    <label class="step-label">Phase 1: Source (Text Audit)</label>
                    <textarea id="sourceText" class="form-control" rows="3" placeholder="Paste UI labels if no image is available..."></textarea>
                </div>

                <hr>

                <div class="mb-4">
                    <label class="step-label" style="color: #fd7e14;">Phase 2: Refinement / Clarity</label>
                    <textarea id="userInput" class="form-control" style="height: 120px;" placeholder="e.g., 'Make the table shorter' or 'Change tone to professional'"></textarea>
                </div>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">Run Agent Logic</button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <div id="progressText" class="text-muted mb-2 small fw-bold">Ready for input</div>
                <div class="progress" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
                </div>

                <div id="output">Polished UX audit will appear here...</div>
                
                <div class="mt-3 d-flex gap-2">
                    <button onclick="copyToClipboard()" class="btn btn-sm btn-outline-secondary">Copy Content</button>
                    <button onclick="clearAll()" class="btn btn-sm btn-outline-danger">Clear Memory</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // THE "HISTORY" VARIABLE: This is where we store the AI's memory for the next call.
    let sessionHistory = ""; 

    async function runAgent() {
        const imageFile = document.getElementById('imageInput').files[0];
        const sourceText = document.getElementById('sourceText').value;
        const notes = document.getElementById('userInput').value;
        
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');

        const formData = new FormData();
        formData.append('notes', notes); // Phase 2 input
        formData.append('sourceText', sourceText); // Phase 1 Text input
        formData.append('history', sessionHistory); // The "Memory"
        if (imageFile) formData.append('image', imageFile);

        // UI State
        btn.disabled = true;
        progressContainer.style.display = 'flex';
        outputDiv.style.opacity = "0.5";
        
        // Progress Bar Simulation
        let width = 0;
        const interval = setInterval(() => {
            if (width < 90) {
                width += 1;
                progressBar.style.width = width + '%';
                progressText.innerText = "Processing & Refining...";
            }
        }, 100);

        try {
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";
            const response = await fetch(LAMBDA_URL, { method: 'POST', body: formData });
            const data = await response.json();
            
            // 1. UPDATE HISTORY: Store the new result so the next Phase 2 call knows about it.
            sessionHistory = data.text;

            // 2. RENDER: Convert Markdown to HTML
            outputDiv.innerHTML = marked.parse(data.text);

            clearInterval(interval);
            progressBar.style.width = '100%';
            progressText.innerText = "Task Complete";
            outputDiv.style.opacity = "1";

        } catch (err) {
            outputDiv.innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            setTimeout(() => { progressContainer.style.display = 'none'; }, 2000);
        }
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        alert("Copied!");
    }

    function clearAll() {
        sessionHistory = "";
        document.getElementById('imageInput').value = "";
        document.getElementById('sourceText').value = "";
        document.getElementById('userInput').value = "";
        document.getElementById('output').innerHTML = "Memory cleared.";
    }
</script>
</body>
</html>
