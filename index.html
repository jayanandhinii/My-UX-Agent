<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Technical Writer Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        #output { min-height: 400px; background: #ffffff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; white-space: pre-wrap; font-size: 15px; line-height: 1.6; }
        .progress { height: 8px; display: none; border-radius: 10px; }
        .loading-spinner { display: none; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">Vision-Powered Technical Documentation</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <h5 class="mb-3">1. Text Notes</h5>
                <textarea id="userInput" class="form-control mb-3" style="height: 150px;" placeholder="Paste rough notes..."></textarea>
                
                <h5 class="mb-3">2. Upload Image</h5>
                <input class="form-control mb-3" type="file" id="imageInput" accept="image/*">
                
                <h5 class="mb-3">3. AI Instruction</h5>
                <textarea id="systemPrompt" class="form-control mb-3" style="height: 100px;">Draft a professional Markdown guide based on the notes and image provided. Be concise.</textarea>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">
                    Generate & Refine
                    <span id="spinner" class="spinner-border spinner-border-sm loading-spinner"></span>
                </button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <h5 class="mb-3">Refined Documentation</h5>
                <div id="progressText" class="text-muted mb-2"></div>
                <div class="progress mb-3" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
                </div>
                <div id="output">Polished content will appear here...</div>
                <div class="mt-4">
                    <h6>Review Notes:</h6>
                    <div id="reviewNotes" class="p-2 text-muted small bg-light rounded italic">...</div>
                </div>
                <button onclick="copyToClipboard()" class="btn btn-outline-secondary mt-3">Copy Markdown</button>
            </div>
        </div>
    </div>
</div>

<script>
    async function runAgent() {
        const notes = document.getElementById('userInput').value;
        const systemPrompt = document.getElementById('systemPrompt').value;
        const imageFile = document.getElementById('imageInput').files[0];
        
        const outputDiv = document.getElementById('output');
        const reviewDiv = document.getElementById('reviewNotes');
        const btn = document.getElementById('genBtn');
        const spinner = document.getElementById('spinner');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');

        if (!notes.trim() && !imageFile) return alert("Please provide notes or an image!");

        // 1. FORM DATA: We use FormData to send files + text
        const formData = new FormData();
        formData.append('notes', notes);
        formData.append('prompt', systemPrompt);
        if (imageFile) formData.append('image', imageFile);

        // UI Feedback
        btn.disabled = true;
        spinner.style.display = "inline-block";
        progressContainer.style.display = 'flex';
        let width = 0;
        const interval = setInterval(() => {
            if (width < 90) {
                width += 1;
                progressBar.style.width = width + '%';
                progressText.innerText = width < 50 ? "Processing image & notes..." : "AI is writing...";
            }
        }, 200);

        try {
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";

            const response = await fetch(LAMBDA_URL, {
                method: 'POST',
                // Important: Browser sets Content-Type automatically for FormData
                body: formData 
            });

            const data = await response.json();
            console.log("Response:::",data) 
            clearInterval(interval);
            progressBar.style.width = '100%';
            progressText.innerText = "Done!";

        const sortedKeys = keys.sort((a, b) => {
    const valA = String(data[a] || "").length;
    const valB = String(data[b] || "").length;
    return valB - valA; 
});

// 3. Dynamically assign based on "Value Size"
const finalMarkdown = data[sortedKeys[0]] || "No content generated.";
const finalReview = data[sortedKeys[1]] || "No review notes provided.";

console.log(`DEBUG: Dynamically mapped ${sortedKeys[0]} -> Output`);
console.log(`DEBUG: Dynamically mapped ${sortedKeys[1]} -> Review`);
            outputDiv.innerText = finalMarkdown
           reviewDiv.innerText = finalReview

        } catch (err) {
            outputDiv.innerText = "Error: " + err.message;
            clearInterval(interval);
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
        }
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        alert("Copied!");
    }
</script>
</body>
</html>
