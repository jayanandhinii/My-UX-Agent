<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Jaya — UX Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* High-quality Output Container */
        #output { 
            min-height: 500px; 
            background: #ffffff; 
            border: 1px solid #e9ecef; 
            border-radius: 12px; 
            padding: 25px; 
            font-size: 15px; 
            line-height: 1.6; 
            overflow-x: auto; 
            color: #2d3436;
        }

        /* Clean Table Rendering */
        #output table { width: 100%; margin: 1.5rem 0; border-collapse: collapse; border-radius: 8px; overflow: hidden; }
        #output th { background-color: #f1f3f5; border: 1px solid #dee2e6; padding: 12px; font-weight: 600; text-align: left; color: #0d6efd; }
        #output td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        #output tr:nth-child(even) { background-color: #fafafa; }

        /* Typography */
        #output h2, #output h3 { color: #0d6efd; margin-top: 25px; font-weight: 700; border-bottom: 2px solid #f1f3f5; padding-bottom: 8px; }
        #output strong { color: #2d3436; }
        
        .progress { height: 6px; display: none; border-radius: 10px; background-color: #e9ecef; }
        .loading-spinner { display: none; }
        .input-label { font-weight: 700; color: #495057; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">UX & Content Refinement Agent</p>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-lg-4">
            <div class="card p-4 h-100">
                <div class="mb-4">
                    <label class="input-label">Upload Screen</label>
                    <input class="form-control" type="file" id="imageInput" accept="image/*">
                </div>
                
                <div class="mb-4">
                    <label class="input-label">Context / Instructions</label>
                    <textarea id="userInput" class="form-control" style="height: 250px;" placeholder="Enter your Content"></textarea>
                </div>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100 shadow-sm">
                    Run the agent
                    <span id="spinner" class="spinner-border spinner-border-sm loading-spinner ms-2"></span>
                </button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0 fw-bold">Polished Output</h5>
                    <div id="progressText" class="text-primary small fw-bold"></div>
                </div>
                
                <div class="progress mb-3" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 0%"></div>
                </div>

                <div id="output">Upload an image or provide text to begin the refined UX audit.</div>
                
                <div class="mt-4 d-flex gap-2">
                    <button onclick="copyToClipboard()" class="btn btn-dark px-4">Copy Content</button>
                    <button onclick="clearInputs()" class="btn btn-outline-danger">Clear Everything</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let sessionHistory = ""; 

    async function runAgent() {
        const notes = document.getElementById('userInput').value;
        const imageInput = document.getElementById('imageInput');
        const imageFile = imageInput.files[0];
        
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');
        const spinner = document.getElementById('spinner');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');

        if (!notes.trim() && !imageFile) return alert("Please provide either an image or text context!");

        const formData = new FormData();
        formData.append('notes', notes);
        if (sessionHistory) formData.append('history', sessionHistory);
        if (imageFile) formData.append('image', imageFile);

        // Reset UI State
        btn.disabled = true;
        spinner.style.display = "inline-block";
        progressContainer.style.display = 'flex';
        outputDiv.style.opacity = "0.4";
        
        let width = 0;
        const interval = setInterval(() => {
            if (width < 95) {
                width += 0.5;
                progressBar.style.width = width + '%';
                // Dynamic feedback for the Double-Pass logic
                if (width < 50) {
                    progressText.innerText = imageFile ? "Analyzing Visuals..." : "Processing Text...";
                } else {
                    progressText.innerText = "Refining & Polishing Output...";
                }
            }
        }, 80);

        try {
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";

            const response = await fetch(LAMBDA_URL, {
                method: 'POST',
                body: formData 
            });

            if (!response.ok) throw new Error(await response.text());

            const data = await response.json();
            const rawText = data.text || "Agent returned no content.";
            
            sessionHistory = rawText; 
            outputDiv.innerHTML = marked.parse(rawText);

            progressText.innerText = "Generation completed";
            progressBar.style.width = '100%';
            outputDiv.style.opacity = "1";

            if (imageFile) imageInput.value = ""; 

        } catch (err) {
            outputDiv.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${err.message}</div>`;
        } finally {
            clearInterval(interval);
            btn.disabled = false;
            spinner.style.display = "none";
            setTimeout(() => { 
                progressContainer.style.display = 'none'; 
                progressBar.style.width = '0%';
                progressText.innerText = "";
            }, 3000);
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text);
        alert("Refined content copied!");
    }

    function clearInputs() {
        sessionHistory = ""; 
        document.getElementById('userInput').value = "";
        document.getElementById('imageInput').value = "";
        document.getElementById('output').innerHTML = "Ready for a new task.";
    }
</script>
</body>
</html>
