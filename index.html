<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Content Agent — Jaya Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        
        #output { 
            min-height: 500px; background: white; border: 1px solid #dee2e6; border-radius: 8px; 
            padding: 25px; font-size: 15px; line-height: 1.6; overflow-x: auto; color: #333;
        }

        /* Improved Table Styling for Markdown */
        #output table { width: 100%; margin-bottom: 1.5rem; border-collapse: collapse; border: 1px solid #eee; }
        #output th { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 12px; text-align: left; font-weight: 600; color: #0d6efd; }
        #output td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        #output tr:nth-child(even) { background-color: #fafafa; }
        
        .step-label { font-weight: 700; color: #0d6efd; margin-bottom: 8px; display: block; font-size: 0.9rem; text-transform: uppercase; }
        .progress { height: 8px; display: none; margin-bottom: 20px; border-radius: 10px; }
        
        .btn-primary { background-color: #0d6efd; border: none; padding: 12px; font-weight: 600; border-radius: 8px; transition: all 0.3s; }
        .btn-primary:hover { background-color: #0b5ed7; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold text-primary">Hi Jaya</h1>
        <p class="text-muted">UX Audit & Content Refinement System</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card p-4 h-100">
                
                <div class="mb-4">
                    <label class="step-label">Phase 1: Source (Image)</label>
                    <input class="form-control" type="file" id="imageInput" accept="image/*">
                </div>

                <div class="mb-4">
                    <label class="step-label text-success">Phase 1: Source (Text Audit)</label>
                    <textarea id="sourceText" class="form-control" rows="3" placeholder="Paste UI labels or copy here if no image..."></textarea>
                </div>

                <hr class="my-4">

                <div class="mb-4">
                    <label class="step-label" style="color: #fd7e14;">Phase 2: Refinement / Clarity</label>
                    <p class="small text-muted">Provide feedback or ask for changes to the previous result.</p>
                    <textarea id="userInput" class="form-control" style="height: 120px;" placeholder="e.g., 'Make the table shorter' or 'Change tone to professional'"></textarea>
                </div>

                <button id="genBtn" onclick="runAgent()" class="btn btn-primary btn-lg w-100">
                    Run Agent Logic
                </button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div id="progressText" class="text-muted small fw-bold">Ready</div>
                    <span id="loadingSpinner" class="spinner-border spinner-border-sm text-primary" style="display: none;"></span>
                </div>
                
                <div class="progress" id="progressContainer">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
                </div>

                <div id="output">Polished UX audit will appear here...</div>
                
                <div class="mt-4 d-flex gap-2">
                    <button onclick="copyToClipboard()" class="btn btn-sm btn-outline-secondary px-3">Copy Content</button>
                    <button onclick="clearAll()" class="btn btn-sm btn-outline-danger px-3">Clear Memory</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let sessionHistory = ""; 

    async function runAgent() {
        const imageFile = document.getElementById('imageInput').files[0];
        const sourceText = document.getElementById('sourceText').value;
        const notes = document.getElementById('userInput').value;
        
        const outputDiv = document.getElementById('output');
        const btn = document.getElementById('genBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');
        const spinner = document.getElementById('loadingSpinner');

        // Validation: Need at least one source or history
        if (!imageFile && !sourceText && !sessionHistory) {
            alert("Please provide a Phase 1 source (Image or Text) to begin.");
            return;
        }

        const formData = new FormData();
        formData.append('notes', notes); 
        formData.append('sourceText', sourceText); 
        formData.append('history', sessionHistory); 
        if (imageFile) formData.append('image', imageFile);

        // UI Initialization
        btn.disabled = true;
        spinner.style.display = "block";
        progressContainer.style.display = 'flex';
        outputDiv.style.opacity = "0.5";
        
        let width = 0;
        const interval = setInterval(() => {
            if (width < 90) {
                width += 1.5;
                progressBar.style.width = width + '%';
                progressText.innerText = "Double-checking & Refining...";
            }
        }, 150);

        try {
            const LAMBDA_URL = "https://yk2tf47ong3um7xxo2fgzhob7e0qaajx.lambda-url.ap-south-1.on.aws/";
            const response = await fetch(LAMBDA_URL, { method: 'POST', body: formData });
            
            if (!response.ok) throw new Error(`Server Error: ${response.status}`);
            
            const data = await response.json();
            
            // --- SAFETY CHECK TO PREVENT MARKED ERROR ---
            const finalContent = data.text || data.result || ""; 

            if (!finalContent) {
                outputDiv.innerHTML = `<div class="alert alert-warning">The agent processed the request but returned no text. Check your Lambda logs.</div>`;
            } else {
                sessionHistory = finalContent; // Store for next Phase 2 run
                outputDiv.innerHTML = marked.parse(finalContent); // Safe parse
            }

            clearInterval(interval);
            progressBar.style.width = '100%';
            progressText.innerText = "Done";
            outputDiv.style.opacity = "1";

        } catch (err) {
            console.error(err);
            outputDiv.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${err.message}<br><small>Check if the Lambda URL is active and CORS is enabled.</small></div>`;
            clearInterval(interval);
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
            setTimeout(() => { 
                progressContainer.style.display = 'none'; 
                progressBar.style.width = '0%';
            }, 3000);
        }
    }

    function copyToClipboard() {
        const textToCopy = document.getElementById('output').innerText;
        if (!textToCopy || textToCopy.startsWith("Polished UX")) return;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("Audit copied to clipboard!");
        });
    }

    function clearAll() {
        sessionHistory = "";
        document.getElementById('imageInput').value = "";
        document.getElementById('sourceText').value = "";
        document.getElementById('userInput').value = "";
        document.getElementById('output').innerHTML = "Memory cleared. Ready for a new task.";
        document.getElementById('progressText').innerText = "Ready";
    }
</script>
</body>
</html>
